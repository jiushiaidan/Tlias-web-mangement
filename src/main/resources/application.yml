server :
  port : 8080
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tlias?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: root
    password: 123456
mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.tlias.model.po
logging:
  # 配置日志级别
  level:
    root: WARN
    com.tlias: WARN
  # 配置日志输出格式
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  # 配置日志文件
  file:
    name: ./logs/application.log
    max-size: 100MB
    max-history: 30
  # 控制台输出配置
  console:
    enabled: true
  # 日志文件输出配置
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      file-name-pattern: ./logs/application.%d{yyyy-MM-dd}.%i.log
